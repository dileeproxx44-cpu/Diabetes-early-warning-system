{% extends 'base.html' %}

{% block content %}

<div class="prediction-form">

    <h2>

        User Login

    </h2>

    {% if error %}

    <p style="color:red;">

        {{ error }}

    </p>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>

            Username

        </label>

        <input
            type="text"
            name="username"
            required
        >

        <label>

            Password

        </label>

        <input
            type="password"
            name="password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

   <p class="register-text">
    If you don't have an account? Please
    <a href="{% url 'register' %}" class="register-link">
        Register
    </a>
    </p>
</div>

{% endblock %}
